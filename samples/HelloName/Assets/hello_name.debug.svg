<svg xmlns="http://www.w3.org/2000/svg" width="976" height="614" viewBox="0 0 976 614">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#172554"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="976" height="614" fill="#0f172a"/>
  <rect x="20" y="20" width="936" height="574" fill="url(#bg)"/>

  <text x="72" y="72" fill="#ffffff" font-size="28" font-family="monospace">Enter your name</text>

  <rect x="72" y="112" width="832" height="52" fill="url(#field)"/>
  <text x="88" y="145" fill="#ffffff" font-size="24" font-family="monospace">todd</text>

  <rect x="418" y="454" width="140" height="52" fill="url(#btn)"/>
  <text x="488" y="488" text-anchor="middle" fill="#ffffff" font-size="22" font-family="monospace">Submit</text>

  <text x="72" y="522" fill="#cbd5e1" font-size="15" font-family="monospace">Type to edit. Enter submits.</text>
  <text x="72" y="544" fill="#cbd5e1" font-size="15" font-family="monospace">Backspace/Delete edits text.</text>
  <text x="72" y="568" fill="#ffffff" font-size="18" font-family="monospace">Greeting: Hello, todd!</text>
</svg>
